  </defs>
  <!-- Background rounded square -->
  <rect x="15" y="15" width="226" height="226" rx="30" ry="30" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <!-- Outer ring -->
  <circle cx="128" cy="118" r="72" fill="none" stroke="#58a6ff" stroke-width="3"/>
  <circle cx="128" cy="118" r="64" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <!-- ECG line -->
  <polyline points="42,118 62,118 72,92 82,148 92,108 102,118 112,118 122,78 132,158 142,100 152,118 162,118 214,118"
