  <text x="128" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#c9d1d9">PCHelper</text>
  <text x="128" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58" letter-spacing="2.5">SYSTEM TOOLKIT</text>
