  <!-- Pulse dot -->
  <circle cx="214" cy="118" r="4" fill="#58a6ff"/>
  <!-- Tech dots -->
  <circle cx="128" cy="52" r="3" fill="#58a6ff"/>
  <circle cx="168" cy="60" r="2" fill="#30363d"/>
  <circle cx="100" cy="56" r="2" fill="#30363d"/>
  <circle cx="184" cy="80" r="2.5" fill="#30363d"/>
  <circle cx="78" cy="74" r="2.5" fill="#30363d"/>
  <circle cx="192" cy="108" r="2" fill="#21262d"/>
  <circle cx="66" cy="104" r="2" fill="#21262d"/>
  <circle cx="190" cy="146" r="2" fill="#21262d"/>
  <circle cx="64" cy="140" r="2" fill="#21262d"/>
